<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIR HOCKEY</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  :root {
    --neon-blue: #00f0ff;
    --neon-red:  #ff003c;
    --neon-white:#e8f4ff;
    --glow-blue: 0 0 8px #00f0ff, 0 0 22px #00f0ff55;
    --glow-red:  0 0 8px #ff003c, 0 0 22px #ff003c55;
  }

  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#010810;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Orbitron',sans-serif;
    color:var(--neon-white);
    overflow:hidden;
    user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%,   rgba(0,240,255,.07) 0%,transparent 70%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(255,0,60,.07)  0%,transparent 70%);
    pointer-events:none;
  }

  h1 {
    font-size:clamp(1rem,3vw,1.6rem);
    font-weight:900; letter-spacing:.45em; text-transform:uppercase;
    color:var(--neon-white); text-shadow:0 0 14px rgba(0,240,255,.5);
    margin-bottom:12px;
  }

  .scoreboard {
    display:flex; align-items:center; justify-content:center;
    gap:0; margin-bottom:12px; width:440px; max-width:95vw;
  }
  .player-label {
    flex:1; text-align:center; font-size:.52rem;
    letter-spacing:.25em; text-transform:uppercase; opacity:.7;
  }
  .player-label.top { color:var(--neon-red); }
  .player-label.bot { color:var(--neon-blue); }
  .score-display { display:flex; align-items:center; gap:16px; }
  .score {
    font-size:clamp(1.8rem,5.5vw,2.8rem); font-weight:900;
    width:64px; text-align:center; line-height:1;
    transition:transform .12s;
  }
  .score.pop { transform:scale(1.4); }
  .score.top  { color:var(--neon-red);  text-shadow:var(--glow-red); }
  .score.bot  { color:var(--neon-blue); text-shadow:var(--glow-blue); }
  .score-sep  { font-size:1.4rem; color:rgba(255,255,255,.2); }

  .canvas-wrapper {
    position:relative; border-radius:22px; overflow:hidden;
    box-shadow:
      0 0 0 2px rgba(0,240,255,.22),
      0 0 40px rgba(0,240,255,.1),
      0 0 90px rgba(0,0,0,.85),
      inset 0 0 50px rgba(0,0,0,.45);
  }
  canvas { display:block; cursor:none; touch-action:none; }

  .controls { margin-top:12px; display:flex; gap:10px; align-items:center; }
  button {
    font-family:'Orbitron',sans-serif; font-size:.58rem; font-weight:700;
    letter-spacing:.2em; text-transform:uppercase; padding:8px 18px;
    border:1px solid rgba(0,240,255,.4); background:rgba(0,240,255,.06);
    color:var(--neon-blue); border-radius:4px; cursor:pointer; transition:all .2s;
  }
  button:hover {
    background:rgba(0,240,255,.16); box-shadow:var(--glow-blue); border-color:var(--neon-blue);
  }
  button.sec { border-color:rgba(255,255,255,.15); color:rgba(255,255,255,.4); background:transparent; }
  button.sec:hover {
    background:rgba(255,255,255,.05); border-color:rgba(255,255,255,.3);
    color:rgba(255,255,255,.7); box-shadow:none;
  }
  .hint {
    font-family:'Share Tech Mono',monospace; font-size:.52rem;
    letter-spacing:.1em; color:rgba(255,255,255,.22); margin-top:7px; text-align:center;
  }

  .overlay {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:rgba(1,8,16,.9); backdrop-filter:blur(7px);
    gap:14px; z-index:10; border-radius:22px;
  }
  .overlay h2 {
    font-size:clamp(1.4rem,4.5vw,2.3rem); font-weight:900;
    letter-spacing:.3em; text-transform:uppercase;
  }
  .overlay h2.blue { color:var(--neon-blue); text-shadow:var(--glow-blue); }
  .overlay h2.red  { color:var(--neon-red);  text-shadow:var(--glow-red); }
  .overlay p {
    font-family:'Share Tech Mono',monospace; font-size:.6rem;
    letter-spacing:.14em; color:rgba(255,255,255,.42);
  }
  .overlay .final {
    font-size:clamp(2.8rem,9vw,4.5rem); font-weight:900; letter-spacing:.05em;
  }
  .overlay .final .s1 { color:var(--neon-red);  text-shadow:var(--glow-red); }
  .overlay .final .s2 { color:rgba(255,255,255,.2); }
  .overlay .final .s3 { color:var(--neon-blue); text-shadow:var(--glow-blue); }
  .overlay button { margin-top:6px; padding:11px 26px; font-size:.68rem; }

  #goal-msg {
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%) scale(0);
    font-size:clamp(1.5rem,4.5vw,2.2rem); font-weight:900;
    letter-spacing:.18em; text-transform:uppercase;
    pointer-events:none; z-index:9; white-space:nowrap;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }
  #goal-msg.show { transform:translate(-50%,-50%) scale(1); }
  #goal-msg.blue { color:var(--neon-blue); text-shadow:var(--glow-blue); }
  #goal-msg.red  { color:var(--neon-red);  text-shadow:var(--glow-red); }
</style>
</head>
<body>

<h1>Air Hockey</h1>

<div class="scoreboard">
  <span class="player-label top">CPU</span>
  <div class="score-display">
    <div class="score top" id="score-top">0</div>
    <div class="score-sep">:</div>
    <div class="score bot" id="score-bot">0</div>
  </div>
  <span class="player-label bot">YOU</span>
</div>

<div class="canvas-wrapper" id="wrapper">
  <canvas id="c"></canvas>
  <div id="goal-msg"></div>
  <div class="overlay" id="start-overlay">
    <h2 class="blue">AIR HOCKEY</h2>
    <p>Move mouse (or finger) to control your paddle</p>
    <p>First to 7 goals wins</p>
    <button id="btn-start">START GAME</button>
  </div>
</div>

<div class="controls">
  <button id="btn-restart" style="display:none">RESTART</button>
  <button class="sec" id="btn-diff">AI: MEDIUM</button>
</div>
<p class="hint">your paddle · bottom half &nbsp;|&nbsp; cpu paddle · top half</p>

<script>
/* ─────────────────────────────────────────────────────────────
   CONSTANTS & GLOBALS
───────────────────────────────────────────────────────────── */
const canvas       = document.getElementById('c');
const ctx          = canvas.getContext('2d');
const wrapper      = document.getElementById('wrapper');
const scoreTopEl   = document.getElementById('score-top');
const scoreBotEl   = document.getElementById('score-bot');
const startOverlay = document.getElementById('start-overlay');
const goalMsgEl    = document.getElementById('goal-msg');
const btnStart     = document.getElementById('btn-start');
const btnRestart   = document.getElementById('btn-restart');
const btnDiff      = document.getElementById('btn-diff');

const W_BASE = 420, H_BASE = 620;
const WIN_SCORE  = 7;
const SUBSTEPS   = 4;        // physics sub-steps per frame
const TRAIL_LEN  = 10;
const GOAL_FRAMES = 90;      // pause frames after goal

let scale = 1, W = 0, H = 0;
const R = v => v * scale;

// Difficulty
let diffLevel = 1;
const DIFFS       = ['EASY','MEDIUM','HARD'];
const AI_MAX_SPD  = [3.8, 7.5, 13.0];   // px/frame at scale=1
const AI_AGRESS   = [0.0,  0.12, 0.28];  // how far AI ventures into opponent half

// Game state
let gameState = 'idle'; // idle | playing | goal | gameover
let scoreTop = 0, scoreBot = 0;
let goalTimer = 0;
let winOverlay = null;
let flashAlpha = 0;
let rafId = null;

// Derived geometry (recalculated on resize)
let PUCK_R, PAD_R, GOAL_W, GOAL_H, GOAL_L, GOAL_R;

// Physics objects
const puck   = {x:0,y:0,vx:0,vy:0};
const padCPU = {x:0,y:0,vx:0,vy:0};  // top / CPU
const padYOU = {x:0,y:0,vx:0,vy:0};  // bottom / player

// Player input target
let tgtX = 0, tgtY = 0;

// Puck trail
const trail = [];

/* ─────────────────────────────────────────────────────────────
   RESIZE
───────────────────────────────────────────────────────────── */
function resize(){
  const maxW = Math.min(window.innerWidth  * 0.96, 480);
  const maxH = Math.min(window.innerHeight * 0.60, 680);
  scale = Math.min(maxW / W_BASE, maxH / H_BASE, 1.1);
  W = canvas.width  = Math.round(W_BASE * scale);
  H = canvas.height = Math.round(H_BASE * scale);
  calcConsts();
}

function calcConsts(){
  PUCK_R = R(12);
  PAD_R  = R(28);
  GOAL_W = R(94);
  GOAL_H = R(11);
  GOAL_L = (W - GOAL_W) / 2;
  GOAL_R = GOAL_L + GOAL_W;
}

/* ─────────────────────────────────────────────────────────────
   RESET POSITIONS
───────────────────────────────────────────────────────────── */
function resetPositions(){
  calcConsts();
  const cx = W/2, cy = H/2;

  // Random puck launch, always diagonal-ish
  const speed = R(4.8);
  const ang = (0.35 + Math.random()*0.30) * Math.PI; // 63–117°
  const flip = Math.random() < 0.5 ? 1 : -1;
  puck.x  = cx; puck.y  = cy;
  puck.vx = Math.cos(ang) * speed * flip;
  puck.vy = Math.sin(ang) * speed * (Math.random()<0.5?1:-1);

  padCPU.x = cx; padCPU.y = R(90); padCPU.vx=0; padCPU.vy=0;
  padYOU.x = cx; padYOU.y = H - R(90); padYOU.vx=0; padYOU.vy=0;

  tgtX = padYOU.x; tgtY = padYOU.y;
  trail.length = 0;
}

/* ─────────────────────────────────────────────────────────────
   INPUT
───────────────────────────────────────────────────────────── */
function applyInput(cx, cy){
  // Player paddle locked to bottom half
  const minX = PAD_R + 2,  maxX = W - PAD_R - 2;
  const minY = H/2 + PAD_R + 2,  maxY = H - PAD_R - 2;
  tgtX = Math.max(minX, Math.min(maxX, cx));
  tgtY = Math.max(minY, Math.min(maxY, cy));
}

canvas.addEventListener('mousemove', e=>{
  const r = canvas.getBoundingClientRect();
  applyInput(e.clientX - r.left, e.clientY - r.top);
});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  applyInput(e.touches[0].clientX - r.left, e.touches[0].clientY - r.top);
},{passive:false});

/* ─────────────────────────────────────────────────────────────
   PLAYER PADDLE UPDATE — velocity-tracked for collision
───────────────────────────────────────────────────────────── */
function updatePlayer(){
  const LERP = 0.30;
  const px = padYOU.x, py = padYOU.y;
  padYOU.x += (tgtX - padYOU.x) * LERP;
  padYOU.y += (tgtY - padYOU.y) * LERP;
  padYOU.vx = padYOU.x - px;
  padYOU.vy = padYOU.y - py;
}

/* ─────────────────────────────────────────────────────────────
   AI — predictive + positional
───────────────────────────────────────────────────────────── */
function predictLanding(fromX, fromY, vx, vy, destY){
  // Trace puck to destY, reflecting off side walls. No drag for prediction.
  let x = fromX, y = fromY;
  const wL = PUCK_R, wR = W - PUCK_R;
  let steps = 0;
  while(steps++ < 800){
    if(Math.abs(vy) < 0.0001) return x;
    const t = (destY - y) / vy;
    if(t > 0){
      x += vx * t;
      // Resolve wall bounces in x
      while(x < wL || x > wR){
        if(x < wL){ x = 2*wL - x; vx = Math.abs(vx); }
        if(x > wR){ x = 2*wR - x; vx = -Math.abs(vx); }
      }
      return x;
    }
    // Step to nearest y wall
    if(vy < 0){
      const dt = (wL - y) / vy; // note: wL here is PUCK_R = top wall
      const dt2 = (PUCK_R - y) / vy;
      x += vx * dt2; y = PUCK_R; vy = -vy;
    } else {
      const dt2 = (H - PUCK_R - y) / vy;
      x += vx * dt2; y = H - PUCK_R; vy = -vy;
    }
    while(x < wL || x > wR){
      if(x < wL){ x = 2*wL - x; vx = Math.abs(vx); }
      if(x > wR){ x = 2*wR - x; vx = -Math.abs(vx); }
    }
  }
  return x;
}

function updateAI(){
  const maxSpd = R(AI_MAX_SPD[diffLevel]);
  const halfH  = H / 2;
  const minX = PAD_R + 2, maxX = W - PAD_R - 2;
  const minY = PAD_R + 2;
  // AI may NOT go past midline + agression allowance
  const maxY = halfH - PAD_R - 2 + halfH * AI_AGRESS[diffLevel];

  const cx = W / 2;
  const homeY  = R(85);
  const strikeY = R(105);

  let tX, tY;

  const puckMovingTowardAI = puck.vy < 0;
  const puckInAIHalf = puck.y < halfH;

  if(puckMovingTowardAI && puckInAIHalf){
    // ── DEFEND: predict where puck arrives at intercept line ──
    const interceptY = homeY + PAD_R + PUCK_R + R(2);
    const landX = predictLanding(puck.x, puck.y, puck.vx, puck.vy, interceptY);
    tX = Math.max(minX, Math.min(maxX, landX));
    tY = homeY;
  } else if(!puckMovingTowardAI && puckInAIHalf){
    // ── ATTACK: move toward puck to strike it ──
    // Aim slightly to one side to angle shot at player goal corners
    const goalEdgeOffset = R(20) * (diffLevel * 0.6);
    const biasDir = (puck.x > cx) ? -1 : 1;
    tX = Math.max(minX, Math.min(maxX, puck.x + biasDir * goalEdgeOffset));
    tY = Math.min(maxY, puck.y + PAD_R + PUCK_R + R(4));
  } else {
    // ── RETREAT: return to home position ──
    tX = cx;
    tY = homeY;
  }

  tX = Math.max(minX, Math.min(maxX, tX));
  tY = Math.max(minY, Math.min(maxY, tY));

  // Move toward target at capped speed, track velocity for physics
  const dx = tX - padCPU.x, dy = tY - padCPU.y;
  const dist = Math.hypot(dx, dy);
  if(dist > 0.5){
    const step = Math.min(dist, maxSpd);
    padCPU.vx = (dx/dist) * step;
    padCPU.vy = (dy/dist) * step;
    padCPU.x += padCPU.vx;
    padCPU.y += padCPU.vy;
  } else {
    padCPU.vx = 0; padCPU.vy = 0;
  }

  padCPU.x = Math.max(minX, Math.min(maxX, padCPU.x));
  padCPU.y = Math.max(minY, Math.min(maxY, padCPU.y));
}

/* ─────────────────────────────────────────────────────────────
   COLLISION — paddle vs puck (impulse-based)
───────────────────────────────────────────────────────────── */
function collidePuckVsPaddle(pad){
  const minDist = PUCK_R + PAD_R;
  let dx = puck.x - pad.x;
  let dy = puck.y - pad.y;
  let dist = Math.hypot(dx, dy);

  if(dist < 0.001){ dx=0; dy=-1; dist=0.001; }
  if(dist >= minDist) return; // no overlap

  // Push out
  const nx = dx/dist, ny = dy/dist;
  puck.x = pad.x + nx*(minDist + 0.5);
  puck.y = pad.y + ny*(minDist + 0.5);

  // Relative velocity along normal
  const rvx = puck.vx - pad.vx;
  const rvy = puck.vy - pad.vy;
  const vDotN = rvx*nx + rvy*ny;

  if(vDotN >= 0) return; // separating, no impulse needed

  const e = 1.08; // restitution — slight energy gain on hit for snappy feel
  const j = -(1+e) * vDotN;
  puck.vx += j*nx;
  puck.vy += j*ny;

  // Hard clamp
  const spd = Math.hypot(puck.vx, puck.vy);
  const MAX = R(15);
  if(spd > MAX){ puck.vx=puck.vx/spd*MAX; puck.vy=puck.vy/spd*MAX; }
}

/* ─────────────────────────────────────────────────────────────
   PUCK PHYSICS (sub-stepped)
───────────────────────────────────────────────────────────── */
function stepPuck(){
  const dt = 1/SUBSTEPS;
  for(let s=0; s<SUBSTEPS; s++){
    puck.x += puck.vx * dt;
    puck.y += puck.vy * dt;

    // Side walls
    if(puck.x < PUCK_R){ puck.x = PUCK_R;     puck.vx =  Math.abs(puck.vx)*0.96; }
    if(puck.x > W-PUCK_R){ puck.x = W-PUCK_R; puck.vx = -Math.abs(puck.vx)*0.96; }

    // Top wall — bounce only outside goal mouth
    if(puck.y < PUCK_R && (puck.x < GOAL_L || puck.x > GOAL_R)){
      puck.y = PUCK_R; puck.vy = Math.abs(puck.vy)*0.96;
    }
    // Bottom wall
    if(puck.y > H-PUCK_R && (puck.x < GOAL_L || puck.x > GOAL_R)){
      puck.y = H-PUCK_R; puck.vy = -Math.abs(puck.vy)*0.96;
    }

    collidePuckVsPaddle(padCPU);
    collidePuckVsPaddle(padYOU);
  }

  // Very light friction (ice-like)
  puck.vx *= 0.9992;
  puck.vy *= 0.9992;

  // Minimum speed (prevents drift stall)
  const spd = Math.hypot(puck.vx, puck.vy);
  const MIN = R(1.6);
  if(spd > 0.001 && spd < MIN){ puck.vx=puck.vx/spd*MIN; puck.vy=puck.vy/spd*MIN; }
}

/* ─────────────────────────────────────────────────────────────
   GOAL DETECTION
───────────────────────────────────────────────────────────── */
function checkGoal(){
  // Puck centre crossed goal line + within goal width
  if(puck.y < 0 && puck.x > GOAL_L && puck.x < GOAL_R){
    scoreBot++;
    scoreBotEl.textContent = scoreBot;
    scoreBotEl.classList.add('pop');
    setTimeout(()=>scoreBotEl.classList.remove('pop'),180);
    triggerGoal('GOAL!','blue');
    return;
  }
  if(puck.y > H && puck.x > GOAL_L && puck.x < GOAL_R){
    scoreTop++;
    scoreTopEl.textContent = scoreTop;
    scoreTopEl.classList.add('pop');
    setTimeout(()=>scoreTopEl.classList.remove('pop'),180);
    triggerGoal('GOAL!','red');
  }
}

function triggerGoal(msg, color){
  gameState = 'goal';
  goalTimer = GOAL_FRAMES;
  flashAlpha = 0.55;

  goalMsgEl.textContent = msg;
  goalMsgEl.className = '';
  void goalMsgEl.offsetWidth;
  goalMsgEl.className = `show ${color}`;

  if(scoreTop >= WIN_SCORE || scoreBot >= WIN_SCORE){
    gameState = 'gameover';
    setTimeout(showWinOverlay, 700);
  }
}

/* ─────────────────────────────────────────────────────────────
   WIN SCREEN
───────────────────────────────────────────────────────────── */
function showWinOverlay(){
  const youWon = scoreBot >= WIN_SCORE;
  const label  = youWon ? 'YOU WIN!' : 'CPU WINS';
  const cls    = youWon ? 'blue' : 'red';
  winOverlay = document.createElement('div');
  winOverlay.className = 'overlay';
  winOverlay.innerHTML = `
    <h2 class="${cls}">${label}</h2>
    <div class="final">
      <span class="s1">${scoreTop}</span><span class="s2"> – </span><span class="s3">${scoreBot}</span>
    </div>
    <button id="btn-again">PLAY AGAIN</button>
  `;
  wrapper.appendChild(winOverlay);
  document.getElementById('btn-again').addEventListener('click', fullReset);
}

function fullReset(){
  scoreTop=0; scoreBot=0;
  scoreTopEl.textContent='0'; scoreBotEl.textContent='0';
  goalMsgEl.className='';
  flashAlpha=0;
  if(winOverlay){ winOverlay.remove(); winOverlay=null; }
  gameState='playing';
  resetPositions();
}

/* ─────────────────────────────────────────────────────────────
   DRAW HELPERS
───────────────────────────────────────────────────────────── */
function rrPath(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

function drawRink(){
  const cx=W/2, cy=H/2;

  ctx.fillStyle='#020d1a';
  rrPath(0,0,W,H,R(22)); ctx.fill();

  const g=ctx.createRadialGradient(cx,cy*.35,0,cx,cy,H*.75);
  g.addColorStop(0,'rgba(0,200,255,.055)'); g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=g; rrPath(0,0,W,H,R(22)); ctx.fill();

  // Midline
  ctx.strokeStyle='rgba(0,240,255,.20)'; ctx.lineWidth=R(1.5);
  ctx.setLineDash([R(8),R(7)]);
  ctx.beginPath(); ctx.moveTo(R(20),cy); ctx.lineTo(W-R(20),cy); ctx.stroke();
  ctx.setLineDash([]);

  // Center circle + dot
  ctx.strokeStyle='rgba(0,240,255,.16)'; ctx.lineWidth=R(1.5);
  ctx.beginPath(); ctx.arc(cx,cy,R(52),0,Math.PI*2); ctx.stroke();
  ctx.fillStyle='rgba(0,240,255,.55)';
  ctx.beginPath(); ctx.arc(cx,cy,R(3.5),0,Math.PI*2); ctx.fill();

  // Face-off spots
  [[-1,1],[1,1],[-1,-1],[1,-1]].forEach(([sx,sy])=>{
    const fx=cx+sx*R(88), fy=cy+sy*R(116);
    ctx.strokeStyle='rgba(0,240,255,.10)'; ctx.lineWidth=R(1);
    ctx.beginPath(); ctx.arc(fx,fy,R(20),0,Math.PI*2); ctx.stroke();
    ctx.fillStyle='rgba(0,240,255,.38)';
    ctx.beginPath(); ctx.arc(fx,fy,R(2.8),0,Math.PI*2); ctx.fill();
  });

  // Goals
  const gx = GOAL_L;
  // CPU (top)
  ctx.fillStyle='rgba(255,0,60,.10)'; ctx.fillRect(gx,-1,GOAL_W,GOAL_H+R(5));
  ctx.strokeStyle='rgba(255,0,60,.60)'; ctx.lineWidth=R(2);
  ctx.strokeRect(gx,0,GOAL_W,GOAL_H);
  [gx, GOAL_R].forEach(px=>{
    ctx.fillStyle='rgba(255,60,80,.85)';
    ctx.beginPath(); ctx.arc(px,1,R(3.5),0,Math.PI*2); ctx.fill();
  });

  // Player (bottom)
  ctx.fillStyle='rgba(0,240,255,.10)'; ctx.fillRect(gx,H-GOAL_H-R(4),GOAL_W,GOAL_H+R(5));
  ctx.strokeStyle='rgba(0,240,255,.60)'; ctx.lineWidth=R(2);
  ctx.strokeRect(gx,H-GOAL_H,GOAL_W,GOAL_H);
  [gx, GOAL_R].forEach(px=>{
    ctx.fillStyle='rgba(0,240,255,.85)';
    ctx.beginPath(); ctx.arc(px,H-1,R(3.5),0,Math.PI*2); ctx.fill();
  });

  // Border glow
  ctx.strokeStyle='rgba(0,240,255,.22)'; ctx.lineWidth=R(2);
  rrPath(R(2),R(2),W-R(4),H-R(4),R(21)); ctx.stroke();
}

function drawPaddle(pad, baseColor, glowColor){
  const {x,y} = pad;
  // Glow
  ctx.save();
  ctx.shadowColor=glowColor; ctx.shadowBlur=R(24);
  ctx.beginPath(); ctx.arc(x,y,PAD_R,0,Math.PI*2);
  ctx.fillStyle=baseColor; ctx.fill();
  ctx.restore();
  // Mid ring
  ctx.beginPath(); ctx.arc(x,y,PAD_R*.76,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,.22)'; ctx.lineWidth=R(1.5); ctx.stroke();
  // Highlight
  const hl=ctx.createRadialGradient(x-PAD_R*.22,y-PAD_R*.22,0,x,y,PAD_R);
  hl.addColorStop(0,'rgba(255,255,255,.24)'); hl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath(); ctx.arc(x,y,PAD_R,0,Math.PI*2);
  ctx.fillStyle=hl; ctx.fill();
  // Knob
  ctx.beginPath(); ctx.arc(x,y,PAD_R*.16,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.78)'; ctx.fill();
}

function drawPuck(){
  // Trail
  for(let i=0;i<trail.length;i++){
    const t=trail[i];
    const a=(i+1)/trail.length*0.26;
    ctx.save(); ctx.globalAlpha=a;
    ctx.beginPath();
    ctx.arc(t.x,t.y, PUCK_R*(0.35+0.55*(i/trail.length)),0,Math.PI*2);
    ctx.fillStyle='#50a8cc'; ctx.fill();
    ctx.restore();
  }
  // Shadow/glow
  ctx.save();
  ctx.shadowColor='rgba(150,215,255,.65)'; ctx.shadowBlur=R(18);
  ctx.beginPath(); ctx.arc(puck.x,puck.y,PUCK_R,0,Math.PI*2);
  ctx.fillStyle='#c5e8ff'; ctx.fill();
  ctx.restore();
  // Inner
  ctx.beginPath(); ctx.arc(puck.x,puck.y,PUCK_R*.55,0,Math.PI*2);
  ctx.fillStyle='#78aec8'; ctx.fill();
  // Shine
  ctx.beginPath(); ctx.arc(puck.x-PUCK_R*.24,puck.y-PUCK_R*.26,PUCK_R*.2,0,Math.PI*2);
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.fill();
}

function drawFlash(){
  if(flashAlpha<=0) return;
  ctx.save(); ctx.globalAlpha=flashAlpha;
  ctx.fillStyle='#ffffff';
  rrPath(0,0,W,H,R(22)); ctx.fill();
  ctx.restore();
  flashAlpha = Math.max(0, flashAlpha - 0.038);
}

/* ─────────────────────────────────────────────────────────────
   MAIN LOOP
───────────────────────────────────────────────────────────── */
function loop(){
  rafId = requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  drawRink();

  if(gameState === 'goal'){
    goalTimer--;
    drawFlash();
    drawPaddle(padCPU,'#cc0030','#ff003c');
    drawPaddle(padYOU,'#007a9a','#00f0ff');
    drawPuck();
    if(goalTimer <= 0 && gameState !== 'gameover'){
      goalMsgEl.className='';
      gameState='playing';
      resetPositions();
    }
    return;
  }

  if(gameState === 'gameover' || gameState === 'idle'){
    drawPaddle(padCPU,'#cc0030','#ff003c');
    drawPaddle(padYOU,'#007a9a','#00f0ff');
    drawPuck();
    return;
  }

  // ── Physics tick ──
  trail.push({x:puck.x, y:puck.y});
  if(trail.length > TRAIL_LEN) trail.shift();

  updatePlayer();
  updateAI();
  stepPuck();
  checkGoal();

  // ── Draw ──
  drawFlash();
  drawPaddle(padCPU,'#cc0030','#ff003c');
  drawPaddle(padYOU,'#007a9a','#00f0ff');
  drawPuck();
}

/* ─────────────────────────────────────────────────────────────
   BUTTON EVENTS
───────────────────────────────────────────────────────────── */
btnDiff.addEventListener('click', ()=>{
  diffLevel = (diffLevel+1) % 3;
  btnDiff.textContent = 'AI: ' + DIFFS[diffLevel];
});

btnStart.addEventListener('click', ()=>{
  startOverlay.style.display='none';
  btnRestart.style.display='inline-block';
  gameState='playing';
  resetPositions();
});

btnRestart.addEventListener('click', ()=>{
  goalMsgEl.className='';
  if(winOverlay){ winOverlay.remove(); winOverlay=null; }
  fullReset();
});

/* ─────────────────────────────────────────────────────────────
   BOOT
───────────────────────────────────────────────────────────── */
resize();
resetPositions();
window.addEventListener('resize', ()=>{ resize(); resetPositions(); });
loop(); // render loop starts immediately (shows idle overlay)
</script>
